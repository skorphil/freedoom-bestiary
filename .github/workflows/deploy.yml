name: Build and deploy site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Ensure animations symlink
        run: |
          if [ ! -e web/animations ]; then
            ln -s ../historical-parser/animations web/animations
          fi

      - name: Build site
        working-directory: web
        run: |
          bun run build
          # Move prerendered files to root for GitHub Pages compatibility
          if [ -d build/client/freedoom-bestiary ]; then
            cp -r build/client/freedoom-bestiary/* build/client/
          fi
          # Copy index.html to 404.html to handle client-side routing
          cp build/client/index.html build/client/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/build/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
